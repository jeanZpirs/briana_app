<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />

    <link rel="stylesheet" href="style.css" />
    <title>Briana - Boutique</title>
  </head>
  <body>
    <header>
      <a href="/">
        <img class="logo" src="imgs/logo.png" alt="Logo Briana Butique" />
      </a>
      <nav class="header__nav">
        <ul>
          <li><a href="/">Inicio</a></li>
          <li><a href="/catalog.html">Cátalogo</a></li>
          <li><a href="/manifest.html">Manifiesto</a></li>
          <li><a href="/contact.html">Contacto</a></li>
          <li>
            <a href="/cart.html">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="header__cart-icon"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"
                />
              </svg>
            </a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="section__slides">
        <div class="swiper">
          <div class="swiper-wrapper">
            <div class="swiper-slide">
              <img src="imgs/slide-1.jpg" alt="Imagen de ropa colgada" />
            </div>
            <div class="swiper-slide">
              <img src="imgs/slide-2.jpg" alt="Imagen de ropa tendida" />
            </div>
            <div class="swiper-slide">
              <img src="imgs/slide-3.jpg" alt="Imagen de ropa ventilada" />
            </div>
          </div>
          <div class="swiper-pagination"></div>
          <div class="swiper-button-prev"></div>
          <div class="swiper-button-next"></div>
        </div>
      </section>

      <section class="section__form">
        <h1 class="form__title">Contacto</h1>

        <div class="form-box">
          <form action="#">
            <div class="form__group">
              <label for="name">Nombre:</label>
              <input type="text" name="name" />
            </div>
            <div class="form__group">
              <label for="email">Email:</label>
              <input type="text" name="email" />
            </div>
            <div class="form__group">
              <label for="phone">Télefono:</label>
              <input type="text" name="phone" />
            </div>
            <div class="form__group">
              <label for="message">Mensaje:</label>
              <textarea
                name="message"
                id=""
                rows="10"
                resizable="false"
              ></textarea>
            </div>
            <button class="form__button" type="submit">Enviar</button>
          </form>
        </div>
      </section>

      <section class="contact">
        <div class="contact__item">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="contact__icon"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 0 0 2.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 0 1-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 0 0-1.091-.852H4.5A2.25 2.25 0 0 0 2.25 4.5v2.25Z"
            />
          </svg>

          <p>+51 901797946</p>
        </div>
        <div class="contact__item">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="contact__icon"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"
            />
          </svg>

          <p>contacto@boutiquebriana.com</p>
        </div>
        <div class="contact__item">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="contact__icon"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"
            />
          </svg>

          <p>Calle Huiracocha 112, Chaclacayo</p>
        </div>
      </section>

      <section class="section__atention">
        <div class="atention">
          <h3 class="atention__title">Horario de atención</h3>
          <p class="atention__day">Lunes - Viernes: 9AM a 7PM</p>
          <p class="atention__day">Sábado: 10AM a 6PM</p>
          <p class="atention__day">Domingo: 11AM a 5PM</p>
        </div>
      </section>
    </main>
    <footer class="footer">
      <a href="/" class="logo">
        <img src="imgs/logo.png" alt="Logo Briana Butique" />
      </a>
      <div class="footer__aboutus">
        <h3 class="footer__title">Sobre nosotros</h3>
        <ul class="footer__links">
          <li><a href="#">Empresa</a></li>
          <li><a href="#">Reclamos</a></li>
          <li><a href="#">Póliticas</a></li>
        </ul>
      </div>
      <div class="footer__red_socials">
        <h3 class="footer__title">Redes sociales</h3>
        <ul class="footer__list_socials">
          <li>
            <a href="#">
              <img
                class="footer__red_socials-icon"
                src="imgs/fb_logo.svg"
                alt="Facebook logo"
            /></a>
          </li>
          <li>
            <a href="#">
              <img
                class="footer__red_socials-icon"
                src="imgs/ig_logo.svg"
                alt="Instagram logo"
              />
            </a>
          </li>
          <li>
            <a href="#">
              <img
                class="footer__red_socials-icon"
                src="imgs/twitter_logo.svg"
                alt="Twiiter logo"
              />
            </a>
          </li>
        </ul>
      </div>
    </footer>
  </body>
  <script type="module">
    import Swiper from "https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.mjs";

    const swiper = new Swiper(".swiper", {
      // Optional parameters
      direction: "horizontal",
      loop: true,

      // If we need pagination
      pagination: {
        el: ".swiper-pagination",
      },

      // Navigation arrows
      navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev",
        addIcons: true,
      },

      // And if we need scrollbar
      scrollbar: {
        el: ".swiper-scrollbar",
      },
    });
  </script>
</html>
